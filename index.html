<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Count</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #202124;
            color: #ffffff;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
        }
        .title {
            font-size: 2rem;
            margin-bottom: 20px;
            color: #bdc1c6;
            letter-spacing: 2px;
        }
        .timer-container {
            display: flex;
            align-items: baseline;
            gap: 10px;
        }
        .timer {
            font-size: 6rem;
            font-weight: bold;
            color: #8ab4f8;
            /* 数字の幅を等幅にして、更新時のガタつきを防ぐ */
            font-variant-numeric: tabular-nums; 
        }
        .unit {
            font-size: 2.5rem;
            color: #bdc1c6;
        }
    </style>
</head>
<body>

    <div class="title">Count</div>
    <div class="timer-container">
        <div class="timer" id="countdown"></div>
        <div class="unit">秒</div>
    </div>

    <script>
        // 2035年1月1日 00:00:00 のタイムスタンプを取得
        const targetDate = new Date('2035-01-01T00:00:00').getTime();
        const countdownElement = document.getElementById('countdown');

        function updateCountdown() {
            const now = new Date().getTime();
            const differenceMs = targetDate - now;

            if (differenceMs > 0) {
                // ミリ秒を秒に変換し、小数点以下2桁にする（.toFixed(2)に戻す）
                const secondsLeft = (differenceMs / 1000).toFixed(2);
                
                // 3桁ごとにカンマを入れて見やすくする処理
                const parts = secondsLeft.split('.');
                parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ",");
                
                countdownElement.textContent = parts.join('.');
            } else {
                // 2035年を迎えた場合（0.00に戻す）
                countdownElement.textContent = "0.00";
            }

            // 次の画面描画のタイミングで再度この関数を呼び出す（滑らかな更新）
            requestAnimationFrame(updateCountdown);
        }

        // 初回実行を開始
        requestAnimationFrame(updateCountdown);
    </script>

</body>
</html>
